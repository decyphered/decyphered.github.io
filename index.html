<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>decyphered</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #00ff66;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      display: grid;
      place-items: center;
    }
    .terminal {
      width: min(900px, 92vw);
      padding: 24px;
      line-height: 1.55;
      font-size: 16px;
    }
    .output { white-space: pre-wrap; }
    .prompt-line {
      display: flex;
      gap: 10px;
      align-items: baseline;
      margin-top: 10px;
    }
    .prompt { white-space: nowrap; }
    input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: inherit;
      font: inherit;
      padding: 0;
    }
    a { color: inherit; text-decoration: underline; }
    .dim { opacity: 0.75; }
  </style>
</head>
<body>
  <main class="terminal" role="application" aria-label="Terminal">
    <div class="output" id="out"></div>

    <div class="prompt-line">
      <div class="prompt" id="prompt">$</div>
      <input id="cmd" type="text" autocomplete="off" spellcheck="false" autofocus />
    </div>

    <div class="dim" style="margin-top:10px;">Type <b>help</b>.</div>
  </main>

  <script>
    const out = document.getElementById("out");
    const cmd = document.getElementById("cmd");

    // --- history state ---
    const history = [];
    let historyIndex = 0;   // points to "next slot"; equals history.length when not browsing
    let draft = "";         // what the user had typed before browsing history
    let sudoCount = 0;

    function print(text = "") {
      out.textContent += text + "\n";
      window.scrollTo(0, document.body.scrollHeight);
    }

    async function loadTextFile(path) {
      const res = await fetch(path, { cache: "no-cache" });
      if (!res.ok) throw new Error(`Could not load ${path} (${res.status})`);
      return await res.text();
    }

    const commands = {
      help: {
        description: "  show this list",
        run: () => {
          const lines = ["commands:"];
          const names = Object.keys(commands).filter(n => !commands[n].hidden);
          const pad = Math.max(...names.map(n => n.length));
          for (const name of names) {
            lines.push(`  ${name.padEnd(pad)}  ${commands[name].description}`);
          }
          print(lines.join("\n"));
        }
      },

      clear: {
        description: "  clear the screen",
        run: () => {
          out.textContent = "";
        }
      },

      ping: {
        description: "gottem",
        hidden: true,
        run: () => {
          print("  pong");
        }
      },

      sudo: {
        description: "try your luck",
        hidden: true,
        run: () => {
          sudoCount++;
          if (sudoCount === 1) print("how dare u");
          else if (sudoCount === 2) print("hey, pal");
          else if (sudoCount === 3) print("that's it");
          else if (sudoCount === 4) print("ur in trouble");
          else if (sudoCount === 5) print("go ahead, do it again");
          else if (sudoCount === 12) print("that time worked! jk. beat it, kid");
          else if (sudoCount === 21) print("success! not lol");
          else print("again");
        }
      },

      whoareyou: {
        description: "  display identity",
        run: () => {
          print("a human that's passionate about open source software and publicly accessible education for all");
        }
      },

      github: {
        description: "  display github",
        run: () => {
          print("https://github.com/decyphered/decyphered.github.io");
        }
      },

      site: {
        description: "  show site details",
        run: () => {
          print("");
          print("decyphered.tech");
          print("---------------");
          print("status:            online");
          print("host:              github pages");
          print("stack:             html + css + vanilla js");
          print("storage:           static files");
          print("dependencies:      none");
          print("design:            terminal, minimal, human");
          print("");
          print("built small. kept readable. hosted openly.");
        }   
      },

      values: {
        description: "  show values.txt",
        run: async () => {
          try {
            const text = await loadTextFile("values.txt");
            print(text.trimEnd());
          } catch (e) {
            print(`error: ${e.message}`);
          }
        }
      },

      about: {
        description: "  show about.txt",
        run: async () => {
          try {
            const text = await loadTextFile("about.txt");
            print(text.trimEnd());
          } catch (e) {
            print(`error: ${e.message}`);
          }
        }
      }
    };

    async function runCommand(raw) {
      const input = raw.trim();
      if (!input) return;

      print(`$ ${input}`);

      const [name, ...args] = input.split(/\s+/);
      const command = commands[name.toLowerCase()];

      if (!command) {
        print(`command not found: ${name}`);
        return;
      }

      await command.run(args);
    }

    function recordHistory(raw) {
      const trimmed = raw.trim();
      if (!trimmed) return;
      if (history[history.length - 1] === trimmed) return; // skip consecutive duplicates
      history.push(trimmed);
    }

    cmd.addEventListener("keydown", async (e) => {
      if (e.key === "Enter") {
        const value = cmd.value;
        cmd.value = "";
        recordHistory(value);
        historyIndex = history.length;  // reset browse position
        draft = "";
        await runCommand(value);
        return;
      }

      if (e.key === "ArrowUp") {
        if (history.length === 0) return;
        e.preventDefault();
        // If we're at the "fresh" position, save current input as draft before browsing
        if (historyIndex === history.length) {
          draft = cmd.value;
        }
        if (historyIndex > 0) {
          historyIndex--;
          cmd.value = history[historyIndex];
          // Move cursor to end
          cmd.setSelectionRange(cmd.value.length, cmd.value.length);
        }
        return;
      }

      if (e.key === "ArrowDown") {
        if (history.length === 0) return;
        e.preventDefault();
        if (historyIndex < history.length) {
          historyIndex++;
          if (historyIndex === history.length) {
            cmd.value = draft;
          } else {
            cmd.value = history[historyIndex];
          }
          cmd.setSelectionRange(cmd.value.length, cmd.value.length);
        }
        return;
      }
    });

    // optional: click anywhere focuses input
    document.addEventListener("click", () => cmd.focus());

    // boot text
    print("decyphered.tech");
    print("-------------");
    print("ready.");
  </script>
</body>
</html>
